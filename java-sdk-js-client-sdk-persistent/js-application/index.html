<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/launchdarkly-js-client-sdk@3"></script>
  </head>
  <body>
    <div class="wrapper">
      <h1>LaunchDarkly Bootstrap Demo</h1>
      
      <div class="content-grid">
        <div class="box">
          <h2>LaunchDarkly Bootstrapped from API</h2>
          <div id="bootstrapJson" class="json-display"></div>
        </div>
        
        <div class="box">
          <h2 id="flagSectionTitle"></h2>
          <div class="widget-indicator">
            <div id="widgetCircle" class="widget-circle off">OFF</div>
            <div class="widget-label"><span id="flagKeyLabel"></span> <span id="widgetValue">false</span></div>
          </div>
          <h3 class="evaluation-context-heading">Context sent for evaluation</h3>
          <div id="evaluationContextJson" class="json-display evaluation-context-json"></div>
        </div>
      </div>
    </div>

    <script src="config.js" onerror="window.__configJsLoadFailed = true"></script>
    <script src="app.js"></script>
  </body>
</html>
