<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/launchdarkly-js-client-sdk@3"></script>
  </head>
  <body>
    <div class="wrapper">
      <h1>LaunchDarkly Bootstrap Demo</h1>
      
      <div class="content-grid">
        <div class="box">
          <h2>LaunchDarkly Bootstrapped from API</h2>
          <div id="bootstrapJson" class="json-display"></div>
        </div>
        
        <div class="box">
          <h2 id="flagSectionTitle"></h2>
          <div id="contextWidgets" class="context-widgets" aria-label="Flag state per user context"></div>
          <h3 class="evaluation-context-heading">Contexts sent for evaluation</h3>
          <div id="contextsEvaluationList" class="contexts-evaluation-list"></div>
        </div>
      </div>
    </div>

    <script src="config.js" onerror="window.__configJsLoadFailed = true"></script>
    <script src="app.js"></script>
  </body>
</html>
