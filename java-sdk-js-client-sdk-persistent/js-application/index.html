<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/launchdarkly-js-client-sdk@3"></script>
  </head>
  <body>
    <div class="wrapper">
      <h1>LaunchDarkly Bootstrap Demo</h1>
      
      <div id="contentGrid" class="content-grid">
        <div class="bootstrap-grid-cell">
          <div class="bootstrap-panel-toggle-wrap">
            <label class="bootstrap-toggle">
              <input
                type="checkbox"
                id="showBootstrapInfo"
                aria-controls="bootstrapPanel"
              />
              Show bootstrap info
            </label>
          </div>
          <div id="bootstrapPanel" class="box bootstrap-panel-box" hidden>
            <h2>LaunchDarkly Bootstrapped from API</h2>
            <div
              id="bootstrapResultsList"
              class="contexts-evaluation-list"
              aria-label="Bootstrap payload per context"
            ></div>
          </div>
        </div>

        <div class="box">
          <h2 class="flag-section-heading">
            <button
              type="button"
              id="flagKeyDisplay"
              class="flag-key-display"
              title="Click to change flag key"
              aria-expanded="false"
              aria-controls="flagKeyForm"
            ></button>
            <form id="flagKeyForm" class="flag-key-form" hidden>
              <input type="text" id="flagKeyInput" class="flag-key-input" autocomplete="off" spellcheck="false" aria-label="Flag key" />
              <button type="submit" class="flag-key-btn flag-key-btn-primary">Save</button>
              <button type="button" id="flagKeyCancel" class="flag-key-btn">Cancel</button>
            </form>
          </h2>
          <div id="contextWidgets" class="context-widgets" aria-label="Flag state per user context"></div>
          <h3 class="evaluation-context-heading">Contexts sent for evaluation</h3>
          <div id="contextsEvaluationList" class="contexts-evaluation-list"></div>
        </div>
      </div>
    </div>

    <script src="demo_contexts.js"></script>
    <script src="config.js" onerror="window.__configJsLoadFailed = true"></script>
    <script src="app.js"></script>
  </body>
</html>
